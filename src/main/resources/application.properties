spring.application.name=wallet-service
spring.datasource.url=jdbc:h2:file:./data/fintech_db;DB_CLOSE_DELAY=-1
spring.h2.console.enabled=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
# Flyway migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Force SQL script execution
# Data seeding is done via Flyway migration V2__seed_data.sql
spring.sql.init.mode=never
# spring.datasource.initialization-mode is deprecated, use spring.sql.init.mode
# Log SQL initialization
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.springframework.boot.autoconfigure.jdbc=DEBUG
# Use different port to avoid conflict
server.port=8081
# รอย้ายไปเก็บใน Environment Variable เพื่อความปลอดภัย
# JWT configuration
app.jwt.secret=mySecretKeyForJWT12345678901234567890
app.jwt.expiration-ms=86400000
